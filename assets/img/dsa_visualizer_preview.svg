<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="barActiveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="barSortedGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="url(#bgGrad)" />

  <!-- Window Header -->
  <rect x="0" y="0" width="800" height="55" fill="#1f2937" opacity="0.5" />
  <circle cx="25" cy="27" r="6" fill="#ef4444" />
  <circle cx="41" cy="27" r="6" fill="#f59e0b" />
  <circle cx="57" cy="27" r="6" fill="#10b981" />
  <text x="400" y="32" font-family="'Poppins', sans-serif" font-size="14" font-weight="700" fill="#f8fafc" text-anchor="middle">DSA Visualizer &amp; AI Explainer</text>
  <rect x="670" y="15" width="105" height="24" rx="12" fill="#374151" />
  <text x="722" y="31" font-family="'Poppins', sans-serif" font-size="10" font-weight="700" fill="#38bdf8" text-anchor="middle">Streamlit App</text>

  <!-- Left: Visualization Bar Area -->
  <g transform="translate(30, 80)">
    <!-- Main visualization frame -->
    <rect width="450" height="300" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1.5" />
    
    <!-- Title inside visualization -->
    <text x="20" y="30" font-family="'Poppins', sans-serif" font-size="12" font-weight="600" fill="#cbd5e1">Algorithm: Quick Sort</text>
    <text x="430" y="30" font-family="'Poppins', sans-serif" font-size="10" fill="#64748b" text-anchor="end">Steps: 42/120</text>

    <!-- The Bars -->
    <g transform="translate(30, 260)">
      <!-- Unsorted Bars (Orange) -->
      <rect x="0" y="-120" width="18" height="120" rx="3" fill="url(#barGrad)" />
      <rect x="25" y="-70" width="18" height="70" rx="3" fill="url(#barGrad)" />
      <rect x="50" y="-180" width="18" height="180" rx="3" fill="url(#barGrad)" />
      <rect x="75" y="-100" width="18" height="100" rx="3" fill="url(#barGrad)" />
      <rect x="100" y="-40" width="18" height="40" rx="3" fill="url(#barGrad)" />
      
      <!-- Compare elements (Cyan) -->
      <rect x="125" y="-140" width="18" height="140" rx="3" fill="url(#barActiveGrad)" />
      <rect x="150" y="-60" width="18" height="60" rx="3" fill="url(#barActiveGrad)" />
      <path d="M134,15 L134,5 L142,10 Z M159,15 L159,5 L151,10 Z" fill="#06b6d4" />
      <text x="146" y="25" font-family="'Poppins', sans-serif" font-size="8" fill="#06b6d4" font-weight="700" text-anchor="middle">SWAP</text>
      
      <!-- Pivot element (Purple) -->
      <rect x="175" y="-110" width="18" height="110" rx="3" fill="#a855f7" />
      <text x="184" y="-120" font-family="'Poppins', sans-serif" font-size="8" fill="#a855f7" font-weight="700" text-anchor="middle">PIVOT</text>

      <!-- Sorted Elements (Green) -->
      <rect x="200" y="-30" width="18" height="30" rx="3" fill="url(#barSortedGrad)" />
      <rect x="225" y="-80" width="18" height="80" rx="3" fill="url(#barSortedGrad)" />
      <rect x="250" y="-130" width="18" height="130" rx="3" fill="url(#barSortedGrad)" />
      <rect x="275" y="-150" width="18" height="150" rx="3" fill="url(#barSortedGrad)" />
      <rect x="300" y="-170" width="18" height="170" rx="3" fill="url(#barSortedGrad)" />
      <rect x="325" y="-200" width="18" height="200" rx="3" fill="url(#barSortedGrad)" />
      <rect x="350" y="-220" width="18" height="220" rx="3" fill="url(#barSortedGrad)" />
    </g>

    <!-- X-axis baseline -->
    <line x1="30" y1="261" x2="420" y2="261" stroke="#334155" stroke-width="2" />
  </g>

  <!-- Left Bottom Controls -->
  <g transform="translate(30, 400)">
    <rect width="450" height="70" rx="12" fill="#1e293b" />
    
    <!-- Control Buttons -->
    <g transform="translate(20, 20)">
      <!-- Play/Pause -->
      <circle cx="20" cy="15" r="18" fill="#10b981" />
      <path d="M 17,9 L 27,15 L 17,21 Z" fill="#fff" />
      
      <!-- Stop -->
      <circle cx="65" cy="15" r="18" fill="#ef4444" />
      <rect x="58" y="8" width="14" height="14" rx="2" fill="#fff" />

      <!-- Speed slider -->
      <text x="120" y="10" font-family="'Poppins', sans-serif" font-size="10" fill="#94a3b8">Speed: 2x</text>
      <rect x="120" y="16" width="130" height="4" rx="2" fill="#475569" />
      <rect x="120" y="16" width="90" height="4" rx="2" fill="#38bdf8" />
      <circle cx="210" cy="18" r="6" fill="#38bdf8" />

      <!-- Array Size -->
      <text x="280" y="10" font-family="'Poppins', sans-serif" font-size="10" fill="#94a3b8">Array Size: 15</text>
      <rect x="280" y="16" width="130" height="4" rx="2" fill="#475569" />
      <rect x="280" y="16" width="70" height="4" rx="2" fill="#38bdf8" />
      <circle cx="350" cy="18" r="6" fill="#38bdf8" />
    </g>
  </g>

  <!-- Right: AI Explanation Box -->
  <g transform="translate(500, 80)" filter="url(#dropShadow)">
    <rect width="270" height="390" rx="12" fill="#1e293b" stroke="#334155" />
    
    <!-- Robot Avatar Header -->
    <g transform="translate(20, 20)">
      <rect width="40" height="40" rx="8" fill="#3b82f6" />
      <!-- Small robot face representation -->
      <circle cx="20" cy="18" r="8" fill="#fff" />
      <rect x="14" y="24" width="12" height="6" rx="2" fill="#fff" />
      <circle cx="17" cy="17" r="1.5" fill="#3b82f6" />
      <circle cx="23" cy="17" r="1.5" fill="#3b82f6" />
      
      <text x="55" y="18" font-family="'Poppins', sans-serif" font-size="12" font-weight="700" fill="#f8fafc">AI Code Explainer</text>
      <text x="55" y="32" font-family="'Poppins', sans-serif" font-size="9" fill="#10b981">● Active Assistant</text>
    </g>

    <!-- Conversation Bubble -->
    <g transform="translate(15, 80)">
      <path d="M 0,10 L 240,10 L 240,250 L 10,250 L 0,260 Z" fill="#0f172a" opacity="0.8" />
      <rect width="240" height="200" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1" />
      
      <!-- Explanation text -->
      <foreignObject x="15" y="15" width="210" height="170">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Poppins', sans-serif; font-size:10.5px; color:#cbd5e1; line-height:1.45;">
          <strong style="color:#06b6d4;">Quick Sort Step:</strong><br />
          We partition around the pivot element <span style="color:#a855f7;">110</span>.<br /><br />
          Comparing left pointer <span style="color:#06b6d4;">140</span> with right pointer <span style="color:#06b6d4;">60</span>. Since <span style="color:#ef4444;">140 &gt; 60</span>, we swap them to maintain ascending order.<br /><br />
          <span style="color:#10b981;">Time Complexity:</span> O(N log N)<br />
          <span style="color:#eab308;">Space Complexity:</span> O(log N)
        </div>
      </foreignObject>
    </g>

    <!-- User Feedback Prompt -->
    <g transform="translate(15, 300)">
      <rect width="240" height="40" rx="6" fill="#111827" stroke="#374151" />
      <text x="15" y="24" font-family="'Poppins', sans-serif" font-size="10.5" fill="#94a3b8">Ask AI about Quick Sort recursion...</text>
      <path d="M 215,20 L 225,20 M 220,15 L 225,20 L 220,25" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    </g>
    
    <text x="135" y="370" font-family="'Poppins', sans-serif" font-size="9" fill="#475569" text-anchor="middle">Powered by Claude &amp; NumPy</text>
  </g>
</svg>
